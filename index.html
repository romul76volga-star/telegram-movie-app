<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Speed Typing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=25">
</head>
<body>
    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div id="start-screen" class="screen">
        <button id="start-btn" class="glass-button">начать</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="timer">01:00</div>
        <div class="game-center">
            <div id="word-input-container" class="glass-input"></div>
        </div>
    </div>

    <div id="end-screen" class="screen hidden">
        <div id="end-title">итог</div>
        <div class="stat-panel glass-panel">
            <div class="stat-line">слов: <span id="final-score">0</span></div>
            <div class="stat-line">ошибок: <span id="final-errors">0</span></div>
        </div>
        <button id="retry-btn" class="glass-button">еще раз</button>
        <button id="share-btn" class="secondary-btn">поделиться</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
