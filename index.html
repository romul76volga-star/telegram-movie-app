<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Speed Typing TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div id="start-screen" class="screen">
        <div class="content-wrapper">
            <button id="start-btn" class="glass-button">начать</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="timer">01:00</div>
        <div class="game-center">
            <div id="word-input-container" class="glass-input"></div>
        </div>
    </div>

    <div id="end-screen" class="screen hidden">
        <div id="end-title">итог</div>
        
        <div class="glass-panel stat-panel">
            <div class="stats-content">
                <div class="stat-line">слов: <span id="final-score">0</span></div>
                <div class="stat-line">ошибок: <span id="final-errors">0</span></div>
            </div>
            <div id="retry-icon-btn" class="retry-icon-wrapper">
                <img src="https://img.icons8.com/ios-filled/100/ffffff/rotate-right.png" alt="retry" class="retry-icon">
            </div>
        </div>

        <div class="end-actions">
            <button id="share-btn" class="secondary-btn">поделиться</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
